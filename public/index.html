<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Morning Routine">
  <title>Morning Routine</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --dark-teal: #002e36; --teal: #006069; --orange: #ff5b2f; --yellow: #ffb600; --gray-bg: #f0f0f0; --white: #ffffff; --ink-light: #5a7a7e; --border: rgba(0,46,54,0.12); --done-bg: #e6f2f3; --done-border: #006069; --done-text: #002e36; }
    body { background: var(--gray-bg); font-family: "Jost", sans-serif; margin: 0; }
    .app { max-width: 420px; margin: 0 auto; padding: 2rem 1.25rem 3rem; }
    .header { text-align: center; margin-bottom: 1.75rem; }
    .date-label { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 1rem; font-weight: 300; }
    .star-streak-row { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 0.6rem; }
    .streak-badge { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .streak-sun { width: 38px; height: 38px; }
    .streak-num { font-size: 13px; font-weight: 500; color: var(--yellow); }
    .streak-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-light); }
    .star-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .star-svg { width: 52px; height: 52px; transition: all 0.4s ease; opacity: 0.15; filter: grayscale(1); }
    .star-svg.earned { opacity: 1; filter: none; animation: starPop 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes starPop { 0%{transform:scale(0.5) rotate(-15deg)} 100%{transform:scale(1) rotate(0deg)} }
    .star-caption { font-size: 11px; color: var(--ink-light); font-weight: 300; }
    .star-caption.show { color: var(--orange); font-weight: 500; }
    .title { font-family: "Cormorant Garamond", serif; font-size: 28px; font-weight: 400; color: var(--dark-teal); margin-top: 0.4rem; letter-spacing: 0.02em; }
    .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
    .progress-track { flex: 1; height: 3px; background: rgba(0,46,54,0.12); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--orange); border-radius: 2px; transition: width 0.4s ease; }
    .progress-count { font-size: 12px; color: var(--ink-light); white-space: nowrap; font-weight: 300; }
    .routines { display: flex; flex-direction: column; gap: 9px; margin-bottom: 1.75rem; }
    .card { display: flex; align-items: center; gap: 14px; background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 0.9rem 1.1rem; cursor: pointer; transition: all 0.25s ease; user-select: none; -webkit-tap-highlight-color: transparent; animation: slideIn 0.35s ease both; }
    .card:hover { border-color: var(--teal); transform: translateY(-1px); }
    .card:active { transform: scale(0.98); }
    .card.done { background: var(--done-bg); border-color: var(--done-border); }
    @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .card:nth-child(1){animation-delay:0.05s} .card:nth-child(2){animation-delay:0.1s} .card:nth-child(3){animation-delay:0.15s} .card:nth-child(4){animation-delay:0.2s} .card:nth-child(5){animation-delay:0.25s}
    .card-icon { font-size: 20px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 10px; background: var(--gray-bg); flex-shrink: 0; }
    .card.done .card-icon { background: rgba(0,96,105,0.12); }
    .card-body { flex: 1; }
    .card-title { font-size: 14px; font-weight: 500; color: var(--dark-teal); }
    .card.done .card-title { color: var(--done-text); }
    .card-sub { font-size: 11px; color: var(--ink-light); margin-top: 1px; font-weight: 300; }
    .card-check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.25s; background: transparent; }
    .card.done .card-check { background: var(--teal); border-color: var(--teal); }
    .check-mark { opacity: 0; font-size: 11px; color: white; transition: opacity 0.2s; }
    .card.done .check-mark { opacity: 1; }
    .strava-card { flex-direction: column; align-items: stretch; cursor: default; }
    .strava-card:hover { transform: none; border-color: var(--border); }
    .strava-card.done:hover { border-color: var(--done-border); }
    .strava-top { display: flex; align-items: center; gap: 14px; width: 100%; }
    .strava-weekly { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .weekly-box { background: var(--gray-bg); border-radius: 10px; padding: 8px 10px; }
    .strava-card.done .weekly-box { background: rgba(0,96,105,0.08); }
    .weekly-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-light); font-weight: 300; margin-bottom: 4px; }
    .weekly-num { font-size: 22px; font-weight: 500; color: var(--dark-teal); }
    .weekly-target { font-size: 10px; color: var(--ink-light); margin-top: 2px; }
    .weekly-target span { color: var(--orange); font-weight: 500; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 0.25rem 0 1.5rem; }
    .reflection-label { font-family: "Cormorant Garamond", serif; font-style: italic; font-size: 20px; color: var(--dark-teal); margin-bottom: 0.4rem; }
    .reflection-sub { font-size: 12px; color: var(--ink-light); margin-bottom: 0.75rem; font-weight: 300; }
    .reflection-box { width: 100%; min-height: 90px; padding: 0.8rem 1rem; background: var(--white); border: 1px solid var(--border); border-radius: 12px; font-family: "Jost", sans-serif; font-size: 13px; color: var(--dark-teal); resize: none; outline: none; transition: border-color 0.2s; line-height: 1.7; font-weight: 300; }
    .reflection-box:focus { border-color: var(--teal); }
    .reflection-box::placeholder { color: #b0b8b9; }
    .save-btn { margin-top: 0.65rem; width: 100%; padding: 0.7rem; background: var(--dark-teal); color: white; border: none; border-radius: 10px; font-family: "Jost", sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; letter-spacing: 0.04em; transition: background 0.2s, transform 0.15s; }
    .save-btn:hover { background: var(--teal); }
    .save-btn:active { transform: scale(0.98); }
    .saved-msg { text-align: center; font-size: 12px; color: var(--teal); margin-top: 0.4rem; height: 16px; opacity: 0; transition: opacity 0.3s; }
    .saved-msg.show { opacity: 1; }
    .add-home-banner { background: var(--dark-teal); color: white; text-align: center; padding: 0.75rem 1rem; font-size: 12px; font-weight: 300; letter-spacing: 0.03em; }
    .add-home-banner strong { font-weight: 500; }
  </style>
</head>
<body>
  <div class="add-home-banner">Add to home screen: tap <strong>Share</strong> then <strong>Add to Home Screen</strong></div>
  <div class="app">
    <div class="header">
      <div class="date-label" id="date-label"></div>
      <div class="star-streak-row">
        <div class="streak-badge">
          <svg class="streak-sun" viewBox="0 0 60 60" fill="none">
            <circle cx="30" cy="30" r="11" fill="#ffb600"/>
            <g stroke="#ffb600" stroke-width="2" stroke-linecap="round">
              <line x1="30" y1="5" x2="30" y2="11"/><line x1="30" y1="49" x2="30" y2="55"/>
              <line x1="5" y1="30" x2="11" y2="30"/><line x1="49" y1="30" x2="55" y2="30"/>
              <line x1="12.2" y1="12.2" x2="16.5" y2="16.5"/><line x1="43.5" y1="43.5" x2="47.8" y2="47.8"/>
              <line x1="47.8" y1="12.2" x2="43.5" y2="16.5"/><line x1="16.5" y1="43.5" x2="12.2" y2="47.8"/>
              <line x1="20" y1="7" x2="22.2" y2="12.8"/><line x1="40" y1="47.2" x2="37.8" y2="53"/>
              <line x1="7" y1="20" x2="12.8" y2="22.2"/><line x1="47.2" y1="40" x2="53" y2="37.8"/>
              <line x1="7" y1="40" x2="12.8" y2="37.8"/><line x1="47.2" y1="20" x2="53" y2="22.2"/>
              <line x1="20" y1="53" x2="22.2" y2="47.2"/><line x1="40" y1="7" x2="37.8" y2="12.8"/>
            </g>
          </svg>
          <div class="streak-num" id="streak-num">0</div>
          <div class="streak-label">day streak</div>
        </div>
        <div class="star-wrap">
          <svg class="star-svg" id="star-svg" viewBox="0 0 60 60">
            <polygon points="30,4 36.5,22 56,22 40.5,33.5 46.5,52 30,41 13.5,52 19.5,33.5 4,22 23.5,22" fill="#ff5b2f"/>
          </svg>
          <div class="star-caption" id="star-caption">complete all 5</div>
        </div>
      </div>
      <h1 class="title">Morning Routine</h1>
    </div>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-count" id="progress-count">0 / 5</div>
    </div>
    <div class="routines" id="routines"></div>
    <hr class="divider">
    <div class="reflection-label">End of day reflection</div>
    <div class="reflection-sub">How are you feeling today?</div>
    <textarea class="reflection-box" id="reflection" placeholder="Write a few words about your day..."></textarea>
    <button class="save-btn" onclick="saveReflection()">Save reflection</button>
    <div class="saved-msg" id="saved-msg">Saved</div>
  </div>
  <script>
    var ITEMS = [
      { id: 'meditation', icon: '🧘', title: 'Meditation', sub: 'Insight Timer' },
      { id: 'journaling', icon: '📓', title: 'Journaling', sub: 'Paper journal' },
      { id: 'emotions', icon: '💛', title: 'Emotions check-in', sub: 'How We Feel' },
      { id: 'reading', icon: '📖', title: 'Read 15 pages', sub: 'Kindle' },
    ];
    function todayKey() { return new Date().toISOString().slice(0,10); }
    function loadState() { return JSON.parse(localStorage.getItem('routine_' + todayKey()) || '{}'); }
    function saveStateData(s) { localStorage.setItem('routine_' + todayKey(), JSON.stringify(s)); }
    var state = loadState();
    var urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('connected') === 'true') {
      state.workedOutToday = parseInt(urlParams.get('today')) || 0;
      state.runs = parseInt(urlParams.get('runs')) || 0;
      state.lifts = parseInt(urlParams.get('lifts')) || 0;
      saveStateData(state);
      window.history.replaceState({}, '', '/');
    }
    function allDone(s) {
      if (!s) return false;
      return ITEMS.every(function(i) { return s[i.id]; }) && (s.workedOutToday || 0) > 0;
    }
    function calcStreak() {
      var streak = 0;
      var d = new Date(); d.setHours(0,0,0,0);
      var todayComplete = allDone(JSON.parse(localStorage.getItem('routine_' + todayKey()) || '{}'));
      for (var i = todayComplete ? 0 : 1; i < 365; i++) {
        var dd = new Date(d); dd.setDate(dd.getDate() - i);
        var key = dd.toISOString().slice(0,10);
        var s = JSON.parse(localStorage.getItem('routine_' + key) || 'null');
        if (allDone(s)) streak++;
        else if (i > 0) break;
      }
      return streak;
    }
    function render() {
      state = loadState();
      var basicDone = ITEMS.filter(function(i) { return state[i.id]; }).length;
      var workedOutToday = (state.workedOutToday || 0) > 0;
      var totalDone = basicDone + (workedOutToday ? 1 : 0);
      document.getElementById('progress-fill').style.width = Math.round((totalDone/5)*100) + '%';
      document.getElementById('progress-count').textContent = totalDone + ' / 5';
      document.getElementById('streak-num').textContent = calcStreak();
      var complete = basicDone === 4 && workedOutToday;
      var star = document.getElementById('star-svg');
      var caption = document.getElementById('star-caption');
      if (complete) { star.classList.add('earned'); caption.classList.add('show'); caption.textContent = 'perfect morning!'; }
      else { star.classList.remove('earned'); caption.classList.remove('show'); caption.textContent = 'complete all 5'; }
      ITEMS.forEach(function(item) {
        var card = document.getElementById('card-' + item.id);
        if (card) { state[item.id] ? card.classList.add('done') : card.classList.remove('done'); }
      });
      var sc = document.getElementById('strava-card');
      if (sc) { workedOutToday ? sc.classList.add('done') : sc.classList.remove('done'); }
      document.getElementById('runs-num').textContent = state.runs || 0;
      document.getElementById('lifts-num').textContent = state.lifts || 0;
      var runsLeft = Math.max(0, 3 - (state.runs || 0));
      var liftsLeft = Math.max(0, 3 - (state.lifts || 0));
      document.getElementById('runs-target').innerHTML = (state.runs||0) >= 3 ? '<span>Goal reached!</span>' : '<span>' + runsLeft + '</span> more to goal';
      document.getElementById('lifts-target').innerHTML = (state.lifts||0) >= 3 ? '<span>Goal reached!</span>' : '<span>' + liftsLeft + '</span> more to goal';
    }
    function toggle(id) { state[id] = !state[id]; saveStateData(state); render(); }
    function buildCards() {
      var container = document.getElementById('routines');
      ITEMS.forEach(function(item) {
        var card = document.createElement('div');
        card.className = 'card'; card.id = 'card-' + item.id;
        card.onclick = function() { toggle(item.id); };
        card.innerHTML = '<div class="card-icon">' + item.icon + '</div><div class="card-body"><div class="card-title">' + item.title + '</div><div class="card-sub">' + item.sub + '</div></div><div class="card-check"><span class="check-mark">&#10003;</span></div>';
        container.appendChild(card);
      });
      var strava = document.createElement('div');
      strava.className = 'card strava-card'; strava.id = 'strava-card';
      var html = '<div class="strava-top">';
      html += '<div class="card-icon">&#127939;</div>';
      html += '<div class="card-body"><div class="card-title">Workout</div><div class="card-sub">Strava</div></div>';
      html += '<div class="card-check"><span class="check-mark">&#10003;</span></div></div>';
      html += '<div class="strava-weekly">';
      html += '<div class="weekly-box"><div class="weekly-label">Runs this week</div><div class="weekly-num" id="runs-num">0</div><div class="weekly-target" id="runs-target"><span>3</span> more to goal</div></div>';
      html += '<div class="weekly-box"><div class="weekly-label">Lifts this week</div><div class="weekly-num" id="lifts-num">0</div><div class="weekly-target" id="lifts-target"><span>3</span> more to goal</div></div>';
      html += '</div>';
      strava.innerHTML = html;
      container.appendChild(strava);
    }
    function saveReflection() {
      localStorage.setItem('reflection_' + todayKey(), document.getElementById('reflection').value);
      var msg = document.getElementById('saved-msg');
      msg.classList.add('show');
      setTimeout(function() { msg.classList.remove('show'); }, 2000);
    }
    document.getElementById('date-label').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    var saved = localStorage.getItem('reflection_' + todayKey());
    if (saved) document.getElementById('reflection').value = saved;
    buildCards(); render();
  </script>
</body>
</html>
